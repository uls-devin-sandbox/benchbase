services:
  # YugabyteDB 3-node cluster
  yugabytedb-node1:
    image: yugabytedb/yugabyte:latest
    container_name: yugabytedb-node1
    ports:
      - "5433:5433"
      - "7000:7000"
      - "9000:9000"
    command: [
      "bin/yugabyted", "start", 
      "--daemon=false", 
      "--ui=false",
      "--master_flags=leader_failure_max_missed_heartbeat_periods=10",
      "--tserver_flags=leader_failure_max_missed_heartbeat_periods=10"
    ]
    environment:
      - YSQL_PASSWORD=yugabyte
    networks:
      - benchbase-network

  yugabytedb-node2:
    image: yugabytedb/yugabyte:latest
    container_name: yugabytedb-node2
    ports:
      - "5434:5433"
      - "7001:7000"
      - "9001:9000"
    command: [
      "bin/yugabyted", "start", 
      "--daemon=false", 
      "--ui=false",
      "--join=yugabytedb-node1:7000",
      "--master_flags=leader_failure_max_missed_heartbeat_periods=10",
      "--tserver_flags=leader_failure_max_missed_heartbeat_periods=10"
    ]
    environment:
      - YSQL_PASSWORD=yugabyte
    depends_on:
      - yugabytedb-node1
    networks:
      - benchbase-network

  yugabytedb-node3:
    image: yugabytedb/yugabyte:latest
    container_name: yugabytedb-node3
    ports:
      - "5435:5433"
      - "7002:7000"
      - "9002:9000"
    command: [
      "bin/yugabyted", "start", 
      "--daemon=false", 
      "--ui=false",
      "--join=yugabytedb-node1:7000",
      "--master_flags=leader_failure_max_missed_heartbeat_periods=10",
      "--tserver_flags=leader_failure_max_missed_heartbeat_periods=10"
    ]
    environment:
      - YSQL_PASSWORD=yugabyte
    depends_on:
      - yugabytedb-node1
    networks:
      - benchbase-network

  # MySQL
  mysql:
    image: mysql:8.0
    container_name: mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=benchbase
      - MYSQL_USER=benchbase
      - MYSQL_PASSWORD=benchbase
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - benchbase-network

  # PostgreSQL
  postgres:
    image: postgres:15
    container_name: postgres
    ports:
      - "5436:5432"
    environment:
      - POSTGRES_DB=benchbase
      - POSTGRES_USER=benchbase
      - POSTGRES_PASSWORD=benchbase
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U benchbase -d benchbase"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - benchbase-network

  # BenchBase application
  benchbase:
    build: .
    container_name: benchbase
    depends_on:
      - mysql
      - postgres
      - yugabytedb-node1
      - yugabytedb-node2
      - yugabytedb-node3
    volumes:
      - ./results:/app/results
      - ./config:/app/config
    networks:
      - benchbase-network
    tty: true
    stdin_open: true

networks:
  benchbase-network:
    driver: bridge

volumes:
  results:
